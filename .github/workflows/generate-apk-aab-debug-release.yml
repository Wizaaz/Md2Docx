name: Generated APK AAB (Push Github - Create Artifact To Github Action)

env:
  main_project_module: app
  playstore_name: Frogobox ID
  build_output_path: buildActionResult

on:
  push:
    branches:
      - 'main'  # 这里改成了 main，因为你之前的截图显示你在 main 分支
      - 'release/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set current date as env variable
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Set repository name as env variable
        run: echo "repository_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      # 强制修复 Gradle 环境，防止组件缺失
      - name: Fix Gradle Wrapper
        run: ./gradlew wrapper

      # - name: Run gradle tests
      #   run: ./gradlew test

      - name: Build gradle project
        run: ./gradlew build

      - name: Build apk debug project (APK) - ${{ env.main_project_module }} module
        run: ./gradlew assembleDebug

      - name: Build apk release project (APK) - ${{ env.main_project_module }} module
        run: ./gradlew assemble

      - name: Build app bundle release (AAB) - ${{ env.main_project_module }} module
        run: ./gradlew ${{ env.main_project_module }}:bundleRelease

      # (以下部分保持不变，用于上传和复制构建产物)
      - name: Upload APK Debug - ${{ env.repository_name }}
        uses: actions/upload-artifact@v4
        with:
          name: APK-debug
          path: ${{ env.main_project_module }}/build/outputs/apk/debug/

      - name: Upload APK Release - ${{ env.repository_name }}
        uses: actions/upload-artifact@v4
        with:
          name: APK-release
          path: ${{ env.main_project_module }}/build/outputs/apk/release/

      - name: Upload AAB Release - ${{ env.repository_name }}
        uses: actions/upload-artifact@v4
        with:
          name: AAB-release
          path: ${{ env.main_project_module }}/build/outputs/bundle/release/

      - name: Clean up build/outputs directory
        run: rm -rf ${{ env.build_output_path }}

      - name: Create build/outputs directory
        run: mkdir -p ${{ env.build_output_path }}

      - name: Copy files to build/outputs
        run: |
          cp -r ${{ env.main_project_module }}/build/outputs/apk/debug/* ${{ env.build_output_path }}/ 2>/dev/null || true
          cp -r ${{ env.main_project_module }}/build/outputs/apk/release/* ${{ env.build_output_path }}/ 2>/dev/null || true
          cp -r ${{ env.main_project_module }}/build/outputs/bundle/release/* ${{ env.build_output_path }}/ 2>/dev/null || true

      - name: Commit & Push build outputs to GitHub
        run: |
          git config user.name '${{ github.actor }}'
          git config user.email '${{ github.actor }}@users.noreply.github.com'
          git add ${{ env.build_output_path }}/ -f
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "ci: upload build outputs - ${{ env.date_today }}" && git push)
